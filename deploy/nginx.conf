# nginx site for Acuity Gateway — TLS terminates here, requests proxy to the
# Node app on 127.0.0.1:3000. setup.sh installs this (substituting the domain)
# and then runs `certbot --nginx` to add the HTTPS (443) server block + redirect.
#
# __DOMAIN__ is replaced by setup.sh with your DOMAIN from .env.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Patient PII is never in URLs; keep bodies small.
    client_max_body_size 256k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # The app sets `trust proxy = 1`, so it reads the real client IP from here.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
