<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acuity Gateway — Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <!-- Login view -->
    <section id="login-view" class="login" hidden>
      <form id="login-form" class="login__card">
        <h1>Acuity Gateway</h1>
        <p class="muted">Admin sign-in</p>
        <input id="password" type="password" placeholder="Admin password" autocomplete="current-password" required />
        <button class="btn" type="submit">Sign in</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </section>

    <!-- Dashboard view -->
    <section id="dash-view" hidden>
      <header class="topbar">
        <div>
          <strong>Acuity Gateway</strong> <span class="muted">/ admin</span>
        </div>
        <div class="topbar__actions">
          <span id="updated" class="muted"></span>
          <button id="sync-btn" class="btn btn--ghost" type="button">Replay queue</button>
          <button id="purge-btn" class="btn btn--ghost" type="button">Run purge</button>
          <button id="pw-btn" class="btn btn--ghost" type="button">Change password</button>
          <button id="logout-btn" class="btn btn--ghost" type="button">Sign out</button>
        </div>
      </header>

      <div class="wrap">
        <div id="pw-panel" class="pw-panel" hidden>
          <form id="pw-form">
            <h3>Change admin password</h3>
            <input id="pw-current" type="password" placeholder="Current password" autocomplete="current-password" required />
            <input id="pw-new" type="password" placeholder="New password (min 8 characters)" autocomplete="new-password" required />
            <input id="pw-confirm" type="password" placeholder="Confirm new password" autocomplete="new-password" required />
            <div class="pw-panel__actions">
              <button class="btn" type="submit">Save new password</button>
              <button id="pw-cancel" class="btn btn--ghost" type="button">Cancel</button>
            </div>
            <p id="pw-msg" hidden></p>
          </form>
        </div>

        <h2>Status</h2>
        <div id="metrics" class="cards"></div>

        <h2>Reconciliation <span id="recon-count" class="pill"></span></h2>
        <p class="muted">Slot collisions surfaced for confirmation — resolved manually, never auto-merged.</p>
        <div id="reconciliation"></div>

        <h2>Outage queue <span id="queue-count" class="pill"></span></h2>
        <div id="queue"></div>

        <h2>Recent activity</h2>
        <div id="audit"></div>
      </div>
    </section>

    <script src="/admin/admin.js"></script>
  </body>
</html>
